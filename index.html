<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Match TriTON</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://unpkg.com/@ton/tonweb@latest"></script>
    <style>
      #debug-log {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px;
        z-index: 1000;
        max-width: 300px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=640 height=360 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Match TriTON</div>
      </div>
    </div>

    <div id="ton-connect"></div>
    <div id="debug-log"></div>
    
    <script>
      function logDebugMessage(message) {
        var debugLog = document.getElementById("debug-log");
        var logEntry = document.createElement("div");
        logEntry.textContent = message;
        debugLog.appendChild(logEntry);
        debugLog.scrollTop = debugLog.scrollHeight;
      }
      
      async function convertToUserFriendlyAddress(rawAddress) {
        try {
          logDebugMessage("Converting address: " + rawAddress);
          const tonweb = new TonWeb();
          const userFriendly = tonweb.utils.toUserFriendlyAddress(rawAddress);
          logDebugMessage("Converted address: " + userFriendly);
          return userFriendly;
        } catch (error) {
          logDebugMessage("Address conversion error: " + error);
          return rawAddress;
        }
      }

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build.data",
        frameworkUrl: buildUrl + "/Build.framework.js",
        codeUrl: buildUrl + "/Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Match TriTON",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "640px";
        canvas.style.height = "360px";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
          
          const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://gospelofmyheart.github.io/TriTONPitch/tonconnect.json',
            buttonRootId: 'ton-connect',
          });
          
          window.connectTonWallet = async function() {
            try {
              logDebugMessage("Connecting to wallet...");
              const connectedWallet = await tonConnectUI.connectWallet();
              logDebugMessage("Wallet connected: " + JSON.stringify(connectedWallet));
              const rawAddress = connectedWallet.account.address || "error";
              logDebugMessage("Raw address: " + rawAddress);
              const userFriendlyAddress = await convertToUserFriendlyAddress(rawAddress);
              logDebugMessage("Final address sent to Unity: " + userFriendlyAddress);
              unityInstance.SendMessage("TonConnect", "OnWalletConnected", userFriendlyAddress);
            } catch (error) {
              logDebugMessage("Wallet connection error: " + error);
              unityInstance.SendMessage("TonConnect", "OnWalletConnected", "error");
            }
          };
          
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
